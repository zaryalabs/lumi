[advisories]
version = 2

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
exceptions = [
  # Build-only stack growth support used by teloxide-core's defensive JSON parser.
  { allow = [
    "Apache-2.0 WITH LLVM-exception",
  ], crate = "ar_archive_writer@0.5.2" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
