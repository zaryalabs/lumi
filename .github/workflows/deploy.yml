name: Deploy Lumi production

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: Full SHA from a successful Lumi main release workflow
        required: true
        type: string

permissions:
  contents: read
  actions: read
  packages: read

concurrency:
  group: lumi-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, zarya-main, geo-eu, deploy]
    environment: production-main
    timeout-minutes: 30
    steps:
      - name: Checkout trusted main contract
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Validate selected main release
        id: release
        shell: bash
        env:
          GIT_SHA: ${{ inputs.git_sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF}" == "refs/heads/main" ]] || {
            echo "Dispatch the deploy workflow from main" >&2
            exit 1
          }
          [[ "${GIT_SHA}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "git_sha must be a full lowercase SHA" >&2
            exit 1
          }
          git merge-base --is-ancestor "${GIT_SHA}" origin/main || {
            echo "${GIT_SHA} is not reachable from origin/main" >&2
            exit 1
          }

          runs_file="${RUNNER_TEMP}/lumi-main-runs.json"
          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/main.yml/runs?branch=main&event=push&status=success&head_sha=${GIT_SHA}" \
            --output "${runs_file}"
          run_id="$(python3 -c 'import json,sys; runs=json.load(open(sys.argv[1], encoding="utf-8")).get("workflow_runs", []); print(runs[0]["id"] if runs else "")' "${runs_file}")"
          [[ -n "${run_id}" ]] || {
            echo "No successful main release workflow found for ${GIT_SHA}" >&2
            exit 1
          }
          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"

      - name: Download the exact successful CI release manifest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: lumi-release-${{ inputs.git_sha }}
          path: builds/releases
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.release.outputs.run_id }}

      - name: Validate downloaded release evidence
        id: manifest
        shell: bash
        env:
          GIT_SHA: ${{ inputs.git_sha }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          manifests=(builds/releases/*.env.images)
          [[ "${#manifests[@]}" -eq 1 ]] || {
            echo "Expected exactly one release manifest" >&2
            exit 1
          }
          manifest="${manifests[0]}"
          ./ops/validate-release-manifest.sh "${manifest}"
          release_sha="$(sed -n 's/^LUMI_RELEASE_SHA=//p' "${manifest}")"
          release_id="$(sed -n 's/^LUMI_RELEASE_ID=//p' "${manifest}")"
          [[ "${release_sha}" == "${GIT_SHA}" ]] || {
            echo "Downloaded manifest SHA does not match requested release" >&2
            exit 1
          }
          echo "path=${manifest}" >> "${GITHUB_OUTPUT}"
          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/docker-config"
          echo "${GITHUB_TOKEN}" | docker --config "${RUNNER_TEMP}/docker-config" login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install and deploy digest-pinned release
        run: |
          make deploy \
            RELEASE_MANIFEST="${RELEASE_MANIFEST}" \
            RELEASE_ID="${RELEASE_ID}"
        env:
          RELEASE_MANIFEST: ${{ steps.manifest.outputs.path }}
          RELEASE_ID: ${{ steps.manifest.outputs.release_id }}

      - name: Logout from GHCR
        if: always()
        run: docker --config "${RUNNER_TEMP}/docker-config" logout ghcr.io || true
