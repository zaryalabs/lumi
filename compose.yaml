services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lumi
      POSTGRES_USER: lumi
      POSTGRES_PASSWORD: lumi-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumi -d lumi"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:${LUMI_POSTGRES_PORT:-5432}:5432"
    volumes:
      - lumi-postgres:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: deployments/Dockerfile.server
    entrypoint: ["lumi-migrate"]
    environment:
      DATABASE_URL: postgres://lumi:lumi-local@postgres:5432/lumi
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  blob-init:
    image: busybox:1.37
    command: ["sh", "-c", "chown -R 65532:65532 /var/lib/lumi/blobs"]
    volumes:
      - lumi-blobs:/var/lib/lumi/blobs
    restart: "no"

  server:
    build:
      context: .
      dockerfile: deployments/Dockerfile.server
    environment:
      DATABASE_URL: postgres://lumi:lumi-local@postgres:5432/lumi
      LUMI_SERVER_BIND: 0.0.0.0:8080
      LUMI_WEB_ORIGIN: http://127.0.0.1:${LUMI_WEB_PORT:-5173}
      LUMI_AUTH_AUDIENCE: http://127.0.0.1:${LUMI_WEB_PORT:-5173}
      LUMI_SECURE_COOKIE: "0"
      LUMI_DEPLOYMENT_MODE: local-container
      LUMI_BLOB_ROOT: /var/lib/lumi/blobs
      RUST_LOG: ${RUST_LOG:-info,tower_http=info}
    depends_on:
      migrate:
        condition: service_completed_successfully
      blob-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/api/v1/ready"]
      interval: 5s
      timeout: 3s
      retries: 24
    ports:
      - "127.0.0.1:${LUMI_SERVER_PORT:-8080}:8080"
    volumes:
      - lumi-blobs:/var/lib/lumi/blobs
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deployments/Dockerfile.web
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:8080/api/v1/ready"]
      interval: 5s
      timeout: 3s
      retries: 12
    ports:
      - "127.0.0.1:${LUMI_WEB_PORT:-5173}:8080"
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

volumes:
  lumi-postgres:
  lumi-blobs:
