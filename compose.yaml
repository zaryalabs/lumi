services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lumi
      POSTGRES_USER: lumi
      POSTGRES_PASSWORD: lumi-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumi -d lumi"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:${LUMI_POSTGRES_PORT:-5432}:5432"
    volumes:
      - lumi-postgres:/var/lib/postgresql/data

volumes:
  lumi-postgres:
